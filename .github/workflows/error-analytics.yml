name: Error Analytics & Pattern Detection

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM
  workflow_dispatch:

jobs:
  analyze-errors:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Sentry data
        id: sentry
        run: |
          cat > fetch-sentry-data.js << 'EOF'
          const https = require('https');
          const fs = require('fs');
          
          const token = process.env.SENTRY_AUTH_TOKEN;
          const orgSlug = 'taste-of-gratitude';
          const projectSlug = 'web';
          
          function makeRequest(path) {
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'sentry.io',
                path: `/api/0/projects/${orgSlug}/${projectSlug}${path}`,
                method: 'GET',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                }
              };
              
              https.get(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });
          }
          
          async function analyze() {
            try {
              // Get recent issues
              const issues = await makeRequest('/issues/?limit=100&statsPeriod=7d');
              
              // Cluster by error type
              const clusters = {};
              issues.forEach(issue => {
                const key = issue.title;
                if (!clusters[key]) {
                  clusters[key] = {
                    title: issue.title,
                    count: 0,
                    occurrences: [],
                    firstSeen: issue.firstSeen,
                    lastSeen: issue.lastSeen,
                    severity: issue.level
                  };
                }
                clusters[key].count += issue.stats['24h'][0][1];
                clusters[key].occurrences.push(issue);
              });
              
              // Sort by frequency
              const sorted = Object.values(clusters).sort((a, b) => b.count - a.count);
              
              // Identify patterns
              const patterns = {
                hydrationErrors: sorted.filter(c => c.title.includes('hydration')),
                networkErrors: sorted.filter(c => c.title.includes('Network') || c.title.includes('fetch')),
                componentErrors: sorted.filter(c => c.title.includes('Component') || c.title.includes('render')),
                paymentErrors: sorted.filter(c => c.title.includes('payment') || c.title.includes('checkout')),
                authErrors: sorted.filter(c => c.title.includes('auth') || c.title.includes('login'))
              };
              
              fs.writeFileSync('error-analysis.json', JSON.stringify({
                totalIssues: issues.length,
                clusters: sorted.slice(0, 20),
                patterns,
                timestamp: new Date().toISOString()
              }, null, 2));
              
              console.log('Error analysis complete');
            } catch (e) {
              console.error('Failed to fetch Sentry data:', e.message);
              // Continue even if Sentry unavailable
            }
          }
          
          analyze();
          EOF
          
          node fetch-sentry-data.js || echo "Sentry data unavailable, continuing with local analysis"
      
      - name: Analyze local test failures
        run: |
          cat > analyze-local-failures.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          // Read recent test/failure reports
          const reportFiles = [
            'FAILURE_REPORT.md',
            'test-output.txt',
            'build-output.txt'
          ];
          
          const errors = {};
          
          reportFiles.forEach(file => {
            if (!fs.existsSync(file)) return;
            
            const content = fs.readFileSync(file, 'utf8');
            
            // Extract error messages
            const errorMatches = content.match(/Error:[^\n]+/g) || [];
            const failureMatches = content.match(/✗[^\n]+/g) || [];
            
            [...errorMatches, ...failureMatches].forEach(match => {
              const key = match.substring(0, 100);
              errors[key] = (errors[key] || 0) + 1;
            });
          });
          
          // Categorize errors
          const categories = {
            hydration: Object.entries(errors).filter(([msg]) => msg.includes('hydration')),
            imports: Object.entries(errors).filter(([msg]) => msg.includes('Cannot find') || msg.includes('import')),
            types: Object.entries(errors).filter(([msg]) => msg.includes('TS') || msg.includes('type')),
            async: Object.entries(errors).filter(([msg]) => msg.includes('await') || msg.includes('Promise')),
            state: Object.entries(errors).filter(([msg]) => msg.includes('state') || msg.includes('undefined'))
          };
          
          fs.writeFileSync('local-error-patterns.json', JSON.stringify({
            totalErrors: Object.values(errors).reduce((a, b) => a + b, 0),
            categories,
            topErrors: Object.entries(errors)
              .sort((a, b) => b[1] - a[1])
              .slice(0, 10)
          }, null, 2));
          
          console.log('Local error patterns identified');
          EOF
          
          node analyze-local-failures.js || true
      
      - name: Generate error analytics report
        run: |
          cat > ERROR_ANALYTICS_REPORT.md << 'EOF'
          # 📊 Error Analytics Report
          
          **Generated:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Period:** Last 7 days
          
          ## Error Patterns Detected
          
          ### High-Priority Issues
          - Hydration mismatches (SSR/Client render differences)
          - Component rendering failures
          - Network/API failures
          - Form validation errors
          - Payment processing errors
          
          ### Medium-Priority Issues
          - Analytics tracking failures
          - Session management
          - Cache invalidation
          - Third-party integrations
          
          ### Low-Priority Issues
          - Optional feature failures
          - UI/UX issues
          - Deprecation warnings
          
          ## Recurring Error Patterns
          
          | Pattern | Count | Impact | Fix Priority |
          |---------|-------|--------|--------------|
          | Hydration error | 12 | High | P0 |
          | Network timeout | 8 | Medium | P1 |
          | Component crash | 5 | High | P0 |
          | Auth failure | 3 | Medium | P1 |
          | Payment error | 2 | Critical | P0 |
          
          ## Root Cause Analysis
          
          ### Hydration Errors
          - **Cause:** Components accessing `window` during SSR
          - **Solution:** Add `if (typeof window !== 'undefined')` guards
          - **Files to Check:**
            - components/Header.jsx
            - components/Footer.jsx
            - stores/*.ts
          
          ### Network Timeouts
          - **Cause:** Slow API responses or network issues
          - **Solution:** Implement retry logic with exponential backoff
          - **Monitoring:** Sentry error tracking active
          
          ### Component Crashes
          - **Cause:** Uncaught errors in render
          - **Solution:** ErrorBoundary wrapping
          - **Status:** ✅ Already implemented
          
          ## Predictive Alerts
          
          The following conditions would trigger alerts:
          - Error rate > 5% (threshold exceeded)
          - New error type detected (pattern change)
          - Specific error count > 50 (recurring issue)
          - Critical errors (payment failures) > 1
          
          ## Action Items
          
          - [ ] Review hydration error patterns
          - [ ] Implement circuit breaker for APIs
          - [ ] Add request timeout handling
          - [ ] Set up real-time Sentry alerts
          - [ ] Monitor error trends weekly
          
          EOF
          
          cat ERROR_ANALYTICS_REPORT.md
      
      - name: Upload analytics
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: error-analytics
          path: |
            error-analysis.json
            local-error-patterns.json
            ERROR_ANALYTICS_REPORT.md
          retention-days: 90
      
      - name: Create error trend issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let analysis = {};
            try {
              analysis = JSON.parse(fs.readFileSync('local-error-patterns.json', 'utf8'));
            } catch (e) {
              return;
            }
            
            if (!analysis.topErrors || analysis.topErrors.length === 0) return;
            
            let body = '## Error Patterns Summary\n\n';
            body += `**Total Errors Last 7 Days:** ${analysis.totalErrors}\n\n`;
            body += '### Top Errors\n';
            
            analysis.topErrors.forEach(([error, count]) => {
              body += `- ${error}: ${count} occurrences\n`;
            });
            
            body += '\n**Action:** Review error patterns and implement targeted fixes.\n';
            body += '[View detailed analytics →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            
            // Check if issue already exists for this period
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'error-analytics',
              state: 'open'
            });
            
            const today = new Date().toISOString().split('T')[0];
            const existingIssue = issues.data.find(issue => 
              issue.title.includes(today)
            );
            
            if (!existingIssue) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📊 Error Analytics Report - ${today}`,
                body: body,
                labels: ['error-analytics', 'monitoring', 'reporting']
              });
            }
