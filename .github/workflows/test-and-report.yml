name: Test & Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      # Run all tests
      - name: Run unit tests
        id: unit_tests
        run: |
          yarn test 2>&1 | tee test-output.txt || echo "UNIT_TESTS_FAILED=true" >> $GITHUB_ENV
          if [ $? -eq 0 ]; then echo "UNIT_TESTS_FAILED=false" >> $GITHUB_ENV; fi
      
      - name: Run smoke tests
        id: smoke_tests
        run: |
          yarn test:smoke 2>&1 | tee smoke-output.txt || echo "SMOKE_TESTS_FAILED=true" >> $GITHUB_ENV
          if [ $? -eq 0 ]; then echo "SMOKE_TESTS_FAILED=false" >> $GITHUB_ENV; fi
      
      - name: Build
        id: build
        run: |
          yarn build 2>&1 | tee build-output.txt || echo "BUILD_FAILED=true" >> $GITHUB_ENV
          if [ $? -eq 0 ]; then echo "BUILD_FAILED=false" >> $GITHUB_ENV; fi
      
      - name: Run TypeScript check
        id: ts_check
        run: |
          yarn tsc --noEmit --skipLibCheck 2>&1 | tee ts-output.txt || echo "TS_CHECK_FAILED=true" >> $GITHUB_ENV
          if [ $? -eq 0 ]; then echo "TS_CHECK_FAILED=false" >> $GITHUB_ENV; fi
      
      # Generate report
      - name: Generate test report
        id: report
        if: always()
        run: |
          cat > test-report.md << 'EOF'
          # 🧪 Test Report
          
          **Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref_name }}
          **Trigger:** ${{ github.event_name }}
          
          ## Test Results
          
          | Test | Status | Details |
          |------|--------|---------|
          | Unit Tests | ${{ env.UNIT_TESTS_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }} | See log |
          | Smoke Tests | ${{ env.SMOKE_TESTS_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }} | See log |
          | Build | ${{ env.BUILD_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }} | See log |
          | TypeScript | ${{ env.TS_CHECK_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }} | See log |
          
          ## Summary
          
          EOF
          
          if [ "${{ env.UNIT_TESTS_FAILED }}" == "true" ] || [ "${{ env.SMOKE_TESTS_FAILED }}" == "true" ] || [ "${{ env.BUILD_FAILED }}" == "true" ] || [ "${{ env.TS_CHECK_FAILED }}" == "true" ]; then
            echo "❌ **OVERALL: FAILED** - Some tests did not pass" >> test-report.md
            echo "OVERALL_STATUS=FAILED" >> $GITHUB_ENV
          else
            echo "✅ **OVERALL: PASSED** - All tests passed" >> test-report.md
            echo "OVERALL_STATUS=PASSED" >> $GITHUB_ENV
          fi
          
          cat test-report.md
      
      # Save artifacts
      - name: Save test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            test-output.txt
            smoke-output.txt
            build-output.txt
            ts-output.txt
            test-report.md
      
      # Comment on PR
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
      
      # Create issue if tests fail
      - name: Create failure issue
        if: env.OVERALL_STATUS == 'FAILED' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('test-report.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Tests Failed on ${new Date().toISOString().split('T')[0]}`,
              body: `**Commit:** ${context.sha}\n**Branch:** ${context.ref}\n\n${report}\n\n**Action Required:** Review logs and fix failing tests.`,
              labels: ['test-failure', 'needs-fix']
            });
      
      - name: Report status
        if: always()
        run: |
          echo "## Test Results Summary"
          echo ""
          echo "Overall Status: ${{ env.OVERALL_STATUS }}"
          echo "Unit Tests: ${{ env.UNIT_TESTS_FAILED == 'true' && 'FAILED' || 'PASSED' }}"
          echo "Smoke Tests: ${{ env.SMOKE_TESTS_FAILED == 'true' && 'FAILED' || 'PASSED' }}"
          echo "Build: ${{ env.BUILD_FAILED == 'true' && 'FAILED' || 'PASSED' }}"
          echo "TypeScript: ${{ env.TS_CHECK_FAILED == 'true' && 'FAILED' || 'PASSED' }}"
