name: Production Health Monitor

on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    name: Monitor Production Health
    runs-on: ubuntu-latest
    # Skip scheduled runs on forks
    if: github.event_name != 'schedule' || github.repository == 'wizelements/Gratog'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Production Health
        id: health
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL || 'https://tasteofgratitude.shop' }}"
          
          echo "Checking: $PROD_URL"
          
          # Function to check endpoint with retries
          check_endpoint() {
            local url=$1
            local max_retries=3
            local retry_count=0
            local response=""
            
            while [ $retry_count -lt $max_retries ]; do
              response=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 30 --connect-timeout 10 2>/dev/null || echo "000")
              
              if [ "$response" != "000" ]; then
                echo "$response"
                return 0
              fi
              
              retry_count=$((retry_count + 1))
              if [ $retry_count -lt $max_retries ]; then
                echo "Retry $retry_count for $url..." >&2
                sleep 5
              fi
            done
            
            echo "000"
            return 1
          }
          
          # Health endpoint check (optional - don't fail if not exists)
          HEALTH_RESPONSE=$(check_endpoint "$PROD_URL/api/health")
          echo "health_status=$HEALTH_RESPONSE" >> $GITHUB_OUTPUT
          
          # Main page check (critical)
          MAIN_RESPONSE=$(check_endpoint "$PROD_URL")
          echo "main_status=$MAIN_RESPONSE" >> $GITHUB_OUTPUT
          
          # API check (optional - don't fail if not exists)
          API_RESPONSE=$(check_endpoint "$PROD_URL/api/products")
          echo "api_status=$API_RESPONSE" >> $GITHUB_OUTPUT
          
          echo "## Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| /api/health | $HEALTH_RESPONSE |" >> $GITHUB_STEP_SUMMARY
          echo "| / (main) | $MAIN_RESPONSE |" >> $GITHUB_STEP_SUMMARY
          echo "| /api/products | $API_RESPONSE |" >> $GITHUB_STEP_SUMMARY
      
      - name: Alert on Failure
        if: steps.health.outputs.main_status != '200' && steps.health.outputs.main_status != '301' && steps.health.outputs.main_status != '302' && steps.health.outputs.main_status != '307' && steps.health.outputs.main_status != '308'
        run: |
          echo "::error::Production health check failed!"
          echo "Health: ${{ steps.health.outputs.health_status }}"
          echo "Main: ${{ steps.health.outputs.main_status }}"
          echo "API: ${{ steps.health.outputs.api_status }}"
          
          # Could add Slack/Discord/email notification here
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text":"🚨 Production down!"}'
          
          exit 1
      
      - name: Log Success
        if: |
          steps.health.outputs.main_status == '200' || 
          steps.health.outputs.main_status == '301' || 
          steps.health.outputs.main_status == '302' ||
          steps.health.outputs.main_status == '307' ||
          steps.health.outputs.main_status == '308'
        run: |
          echo "✅ Production is responding (Status: ${{ steps.health.outputs.main_status }})"

  performance-check:
    name: Performance Baseline
    runs-on: ubuntu-latest
    # Skip scheduled runs on forks
    if: github.event_name != 'schedule' || github.repository == 'wizelements/Gratog'
    
    steps:
      - name: Measure Response Times
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL || 'https://tasteofgratitude.shop' }}"
          
          echo "## Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | Time (ms) |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|" >> $GITHUB_STEP_SUMMARY
          
          # Measure response times
          for endpoint in "/api/health" "/" "/api/products"; do
            TIME=$(curl -s -o /dev/null -w "%{time_total}" "$PROD_URL$endpoint" --max-time 30 || echo "timeout")
            TIME_MS=$(echo "$TIME * 1000" | bc 2>/dev/null || echo "$TIME")
            echo "| $endpoint | $TIME_MS |" >> $GITHUB_STEP_SUMMARY
          done
