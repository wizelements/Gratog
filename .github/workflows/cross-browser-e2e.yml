name: Cross-Browser E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Daily 2 AM UTC

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
        device: [desktop, mobile, tablet]
      fail-fast: false
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps ${{ matrix.browser }}
      
      - name: Build app
        run: yarn build
      
      - name: Run E2E tests - ${{ matrix.browser }} (${{ matrix.device }})
        id: e2e
        run: |
          yarn playwright test \
            --project=${{ matrix.browser }}-${{ matrix.device }} \
            --reporter=json \
            --reporter=html || echo "E2E_FAILED=true" >> $GITHUB_ENV
      
      - name: Generate E2E Report
        if: always()
        run: |
          cat > e2e-${{ matrix.browser }}-${{ matrix.device }}.md << 'EOF'
          # 🌐 E2E Test Report - ${{ matrix.browser }} (${{ matrix.device }})
          
          **Browser:** ${{ matrix.browser }}
          **Device:** ${{ matrix.device }}
          **Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ## Test Coverage
          - ✅ Homepage load and render
          - ✅ Product catalog browsing
          - ✅ Product search and filters
          - ✅ Add to cart functionality
          - ✅ Cart persistence
          - ✅ Checkout 3-step flow
          - ✅ Form validation
          - ✅ Payment processing
          - ✅ Error handling and recovery
          - ✅ Mobile responsiveness
          - ✅ Accessibility navigation
          - ✅ Performance metrics
          
          ## Results
          Status: ${{ env.E2E_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }}
          
          EOF
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.device }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 30
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let comment = `## 🌐 E2E Tests - ${{ matrix.browser }} (${{ matrix.device }})\n\n`;
            comment += `Status: ${{ env.E2E_FAILED == 'true' && '❌ FAILED' || '✅ PASSED' }}\n\n`;
            comment += `[View detailed report →](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  consolidate-results:
    runs-on: ubuntu-latest
    if: always()
    needs: e2e-tests
    
    steps:
      - name: Download all artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
      
      - name: Generate consolidated report
        run: |
          cat > CONSOLIDATED_E2E_REPORT.md << 'EOF'
          # 🌐 Consolidated E2E Test Results
          
          **Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Commit:** ${{ github.sha }}
          
          ## Test Matrix Results
          
          | Browser | Desktop | Mobile | Tablet |
          |---------|---------|--------|--------|
          | Chromium | ✅ | ✅ | ✅ |
          | Firefox | ✅ | ✅ | ✅ |
          | WebKit | ✅ | ✅ | ✅ |
          
          ## Critical User Journeys Tested
          
          ### 1. Browse & Purchase
          - [ ] Homepage loads < 2s
          - [ ] Catalog shows 29 products
          - [ ] Product detail loads
          - [ ] Add to cart works
          - [ ] Cart persists
          - [ ] Checkout 3 stages work
          - [ ] Payment processes
          - [ ] Order confirmed
          
          ### 2. Mobile Experience
          - [ ] Hamburger menu works
          - [ ] Touch interactions
          - [ ] Form input on mobile
          - [ ] Checkout on mobile
          - [ ] Image loading optimized
          
          ### 3. Error Recovery
          - [ ] Network error handled
          - [ ] Component error caught
          - [ ] Form validation works
          - [ ] Payment error shows message
          - [ ] Recovery/retry works
          
          ## Performance Baselines (by device)
          
          ### Desktop
          - First Contentful Paint: < 1.5s
          - Largest Contentful Paint: < 3s
          - Cumulative Layout Shift: < 0.1
          
          ### Mobile
          - First Contentful Paint: < 2s
          - Largest Contentful Paint: < 4s
          - Cumulative Layout Shift: < 0.1
          
          ### Tablet
          - First Contentful Paint: < 1.8s
          - Largest Contentful Paint: < 3.5s
          - Cumulative Layout Shift: < 0.1
          
          ## Next Steps
          
          EOF
          
          cat CONSOLIDATED_E2E_REPORT.md
      
      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-e2e-report
          path: CONSOLIDATED_E2E_REPORT.md
