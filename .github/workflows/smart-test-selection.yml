name: Smart Test Selection

on:
  pull_request:
    branches: [main, develop]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      test-unit: ${{ steps.select.outputs.test-unit }}
      test-e2e: ${{ steps.select.outputs.test-e2e }}
      test-integration: ${{ steps.select.outputs.test-integration }}
      test-accessibility: ${{ steps.select.outputs.test-accessibility }}
      test-performance: ${{ steps.select.outputs.test-performance }}
      test-security: ${{ steps.select.outputs.test-security }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: files
        run: |
          # Get all changed files compared to main
          git diff --name-only origin/main...HEAD > changed_files.txt
          echo "=== Changed files ==="
          cat changed_files.txt
      
      - name: Intelligent test selection
        id: select
        run: |
          cat > select-tests.js << 'EOF'
          const fs = require('fs');
          
          const changedFiles = fs.readFileSync('changed_files.txt', 'utf8')
            .split('\n')
            .filter(f => f.trim());
          
          const testSelection = {
            unit: false,
            e2e: false,
            integration: false,
            accessibility: false,
            performance: false,
            security: false
          };
          
          const componentPatterns = {
            unit: [
              'lib/',
              'utils/',
              'stores/',
              'hooks/',
              'services/',
              '.test.ts',
              '.test.tsx'
            ],
            e2e: [
              'components/',
              'app/',
              'pages/',
              '.e2e.ts'
            ],
            integration: [
              'api/',
              'server/',
              'adapters/',
              '.integration.ts'
            ],
            accessibility: [
              'components/',
              'pages/',
              'app/'
            ],
            performance: [
              'components/',
              'lib/',
              'public/',
              'next.config.js',
              'package.json'
            ],
            security: [
              'middleware.ts',
              'sentry',
              'auth',
              'env',
              'package.json'
            ]
          };
          
          // Check each test category
          for (const [category, patterns] of Object.entries(componentPatterns)) {
            const categoryKey = category === 'e2e' ? 'e2e' : category;
            
            for (const file of changedFiles) {
              for (const pattern of patterns) {
                if (file.includes(pattern)) {
                  testSelection[categoryKey] = true;
                  console.log(`✅ Enable ${category}: ${file} matches ${pattern}`);
                  break;
                }
              }
              if (testSelection[categoryKey]) break;
            }
          }
          
          // Always run full suite for critical files
          const criticalFiles = [
            'middleware.ts',
            'next.config.js',
            'package.json',
            'tsconfig.json'
          ];
          
          const changesAreCritical = changedFiles.some(f => 
            criticalFiles.some(cf => f.includes(cf))
          );
          
          if (changesAreCritical) {
            console.log('⚠️ Critical files changed - running full test suite');
            testSelection.unit = true;
            testSelection.e2e = true;
            testSelection.integration = true;
            testSelection.accessibility = true;
            testSelection.performance = true;
            testSelection.security = true;
          }
          
          // If no tests selected, run unit tests
          if (!Object.values(testSelection).some(v => v)) {
            console.log('No specific tests matched - running unit tests');
            testSelection.unit = true;
          }
          
          fs.writeFileSync('test-selection.json', JSON.stringify({
            selectedTests: testSelection,
            changedFileCount: changedFiles.length,
            changedFiles
          }, null, 2));
          
          console.log('\n📋 Test Selection Summary:');
          console.log(JSON.stringify(testSelection, null, 2));
          
          // Output for GitHub Actions
          Object.entries(testSelection).forEach(([key, value]) => {
            console.log(`::set-output name=test-${key}::${value}`);
          });
          EOF
          
          node select-tests.js
      
      - name: Upload test selection
        uses: actions/upload-artifact@v4
        with:
          name: test-selection
          path: test-selection.json

  unit-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-unit == 'true'
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: yarn test --coverage
      
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-e2e == 'true'
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test:e2e

  integration-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-integration == 'true'
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: yarn test:integration

  accessibility-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-accessibility == 'true'
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test:a11y

  performance-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-performance == 'true'
    runs-on: ubuntu-latest
    
    env:
      SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
      SQUARE_APPLICATION_ID: ${{ secrets.SQUARE_APPLICATION_ID }}
      NEXT_PUBLIC_SQUARE_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_SQUARE_APPLICATION_ID }}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${{ secrets.SQUARE_WEBHOOK_SIGNATURE_KEY }}
      SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
      SQUARE_ENVIRONMENT: sandbox
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: yarn build
      - run: yarn test:lighthouse

  security-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.test-security == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - run: yarn install --frozen-lockfile
      - run: npm audit --audit-level=high
      - run: yarn test:security

  summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, unit-tests, e2e-tests, integration-tests, accessibility-tests, performance-tests, security-tests]
    if: always()
    
    steps:
      - name: Download test selection
        uses: actions/download-artifact@v3
        with:
          name: test-selection
      
      - name: Generate summary
        run: |
          cat > TEST_SUMMARY.md << 'EOF'
          # 🧪 Smart Test Execution Summary
          
          **Strategy:** Intelligent test selection based on code changes
          
          ## Tests Executed
          
          - Unit Tests: ${{ needs.detect-changes.outputs.test-unit }}
          - E2E Tests: ${{ needs.detect-changes.outputs.test-e2e }}
          - Integration Tests: ${{ needs.detect-changes.outputs.test-integration }}
          - Accessibility Tests: ${{ needs.detect-changes.outputs.test-accessibility }}
          - Performance Tests: ${{ needs.detect-changes.outputs.test-performance }}
          - Security Tests: ${{ needs.detect-changes.outputs.test-security }}
          
          ## Benefits
          
          ✅ Faster CI/CD pipelines  
          ✅ Only relevant tests run  
          ✅ Reduced resource usage  
          ✅ Quicker feedback to developers  
          ✅ Critical files trigger full suite  
          
          EOF
          
          cat TEST_SUMMARY.md
      
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const selection = JSON.parse(fs.readFileSync('test-selection.json', 'utf8'));
            
            let comment = `## 🧪 Smart Test Selection\n\n`;
            comment += `**Changed Files:** ${selection.changedFileCount}\n\n`;
            comment += `### Tests Executed\n`;
            comment += `- Unit: ${selection.selectedTests.unit ? '✅' : '⏭️'}\n`;
            comment += `- E2E: ${selection.selectedTests.e2e ? '✅' : '⏭️'}\n`;
            comment += `- Integration: ${selection.selectedTests.integration ? '✅' : '⏭️'}\n`;
            comment += `- Accessibility: ${selection.selectedTests.accessibility ? '✅' : '⏭️'}\n`;
            comment += `- Performance: ${selection.selectedTests.performance ? '✅' : '⏭️'}\n`;
            comment += `- Security: ${selection.selectedTests.security ? '✅' : '⏭️'}\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
