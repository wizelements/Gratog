name: Vorax Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  vorax-scan:
    name: Vorax Full Coverage Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run Vorax Quick Scan
        id: vorax
        run: |
          echo "## 🦖 Vorax Quality Report" >> $GITHUB_STEP_SUMMARY
          
          # Run Vorax quick scan
          node .vorax/vorax-cli.js quick 2>&1 | tee vorax-output.log || true
          
          # Check for critical issues
          if grep -q "CRITICAL" vorax-output.log; then
            echo "::error::Vorax found critical issues"
            echo "❌ **Critical issues detected**" >> $GITHUB_STEP_SUMMARY
            cat vorax-output.log >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ Vorax scan passed" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload Vorax Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vorax-report
          path: |
            vorax-output.log
            .vorax/reports/
          retention-days: 30

  coverage-gate:
    name: Test Coverage Gate
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run Unit Tests with Coverage
        run: |
          yarn test:unit 2>&1 | tee test-output.log || true
          
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          
          # Extract coverage summary
          if grep -q "All files" test-output.log; then
            grep -A2 "All files" test-output.log >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check Coverage Threshold
        run: |
          # For now, just report - can enforce thresholds later
          echo "Coverage report generated"

  security-headers-check:
    name: Verify Security Headers
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Check Security Headers
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL || 'https://tasteofgratitude.shop' }}"
          
          echo "## Security Headers Check" >> $GITHUB_STEP_SUMMARY
          
          HEADERS=$(curl -sI "$PROD_URL" 2>/dev/null || echo "Failed to fetch")
          
          check_header() {
            if echo "$HEADERS" | grep -qi "$1"; then
              echo "✅ $1: Present" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $1: Missing" >> $GITHUB_STEP_SUMMARY
            fi
          }
          
          check_header "X-Content-Type-Options"
          check_header "X-Frame-Options"
          check_header "Content-Security-Policy"
          check_header "Referrer-Policy"
