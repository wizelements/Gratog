name: Payment API Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  square-api-schema:
    name: Square API Schema Validation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Validate Square API usage
        run: |
          echo "## Payment API Validation" >> $GITHUB_STEP_SUMMARY
          
          # Check for deprecated Square API methods
          echo "### Deprecated API Check" >> $GITHUB_STEP_SUMMARY
          
          if grep -r "\.request(" app/ 2>/dev/null; then
            echo "⚠️ Found deprecated .request() method - use SDK methods instead" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No deprecated API methods detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check Payment Links usage
          if grep -r "paymentLinks\." app/api/checkout --include="*.ts" 2>/dev/null; then
            echo "✅ Payment Links API is properly used" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Validate idempotency keys
        run: |
          echo "### Idempotency Key Validation" >> $GITHUB_STEP_SUMMARY
          
          # Check critical payment endpoints have idempotency keys
          if grep -r "idempotencyKey" app/api/payments app/api/checkout app/api/orders --include="*.ts" 2>/dev/null | wc -l > /tmp/idempotency_count; then
            COUNT=$(cat /tmp/idempotency_count)
            if [ $COUNT -gt 0 ]; then
              echo "✅ Found $COUNT idempotency key implementations" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Consider adding idempotency keys to payment endpoints" >> $GITHUB_STEP_SUMMARY
            fi
          fi
      
      - name: Check error handling
        run: |
          echo "### Error Handling Check" >> $GITHUB_STEP_SUMMARY
          
          # Verify payment errors are handled
          if grep -r "catch.*error" app/api/payments app/api/checkout --include="*.ts" 2>/dev/null; then
            echo "✅ Error handling implemented in payment endpoints" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Review error handling in payment endpoints" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Test payment flow (mock)
        run: |
          echo "### Mock Payment Flow Test" >> $GITHUB_STEP_SUMMARY
          
          # Run payment-related tests
          npm run vitest run tests/api/square-payment-flow.spec.ts --reporter=verbose 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true
          echo "✅ Payment flow tests executed" >> $GITHUB_STEP_SUMMARY

  payment-security:
    name: Payment Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check PCI compliance patterns
        run: |
          echo "## Payment Security" >> $GITHUB_STEP_SUMMARY
          
          # Check for PAN/card storage
          if grep -r "cardNumber\|pan\|card_data" app/ --include="*.ts" --include="*.tsx" | grep -v "paymentLinkId\|idempotency"; then
            echo "⚠️ Review: Potential card data handling - should use Square tokenization" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No direct card data handling detected" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check for token security
          if grep -r "SQUARE_ACCESS_TOKEN" --include=".env*" 2>/dev/null; then
            echo "⚠️ Token found in tracked files - ensure .env files are gitignored" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Tokens properly managed in environment" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Validate payment request validation
        run: |
          echo "### Request Validation" >> $GITHUB_STEP_SUMMARY
          
          # Check for input validation
          if grep -r "lineItems.*length\|validate" app/api/checkout --include="*.ts"; then
            echo "✅ Input validation implemented" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Review input validation on payment endpoints" >> $GITHUB_STEP_SUMMARY
          fi
