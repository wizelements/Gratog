name: Performance & Bundle Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  bundle-analysis:
    name: Bundle Size & Performance Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Build application
        run: yarn build
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
      
      - name: Analyze bundle size
        run: |
          echo "## Bundle Analysis" >> $GITHUB_STEP_SUMMARY
          
          # Get build stats
          if [ -f .next/build-manifest.json ]; then
            echo "### Build Statistics" >> $GITHUB_STEP_SUMMARY
            du -sh .next >> $GITHUB_STEP_SUMMARY || true
            
            # Check for large chunks (>500KB)
            echo "### Large Chunks (>500KB)" >> $GITHUB_STEP_SUMMARY
            find .next/static -name "*.js" -type f -exec du -h {} + | awk '$1 ~ /M|[5-9][0-9]{2}K/ {print $2}' >> $GITHUB_STEP_SUMMARY || echo "✅ No problematic chunks" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Check build time regression
        run: |
          BUILD_TIME=$(date +%s)
          echo "Build completed at: $BUILD_TIME"
          
          # Warn if build time seems excessive
          if [ $BUILD_TIME -gt 180 ]; then
            echo "⚠️ Build time > 3 minutes - consider optimization"
          else
            echo "✅ Build time acceptable"
          fi
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-stats
          path: .next/
          retention-days: 3

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
