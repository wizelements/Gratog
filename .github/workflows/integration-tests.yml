name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Wait for MongoDB
        run: |
          echo "Waiting for MongoDB to be ready..."
          max_attempts=60
          attempt=0
          wait_time=1
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            
            if mongosh --eval "db.adminCommand({ping: 1})" --quiet mongodb://localhost:27017 2>/dev/null; then
              echo "✅ MongoDB is ready!"
              break
            fi
            
            echo "Attempt $attempt/$max_attempts: MongoDB not ready yet (waiting ${wait_time}s)"
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ MongoDB failed to start within 120 seconds"
              docker logs mongo 2>/dev/null || echo "Could not get Docker logs"
              exit 1
            fi
            
            # Exponential backoff: 1s, 2s, 3s, max 5s
            if [ $wait_time -lt 5 ]; then
              wait_time=$((wait_time + 1))
            fi
            sleep $wait_time
          done
      
      - name: Build application
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/test_db
          MONGO_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-for-ci
          ADMIN_JWT_SECRET: test-admin-jwt-secret-for-ci
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Start server in background
        run: |
          echo "Starting Next.js server..."
          npm run start > server.log 2>&1 &
          echo $! > server.pid
          echo "Server PID: $(cat server.pid)"
          sleep 3
          echo "Server logs:"
          head -20 server.log || true
        env:
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017/test_db
          MONGO_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-for-ci
          ADMIN_JWT_SECRET: test-admin-jwt-secret-for-ci
          ADMIN_API_KEY: test-admin-api-key
          MASTER_API_KEY: test-master-api-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          max_attempts=60
          attempt=0
          wait_time=1
          
          while [ $attempt -lt $max_attempts ]; do
            attempt=$((attempt + 1))
            
            response=$(curl -s -w "\n%{http_code}" http://localhost:3000/api/health 2>&1 || echo "000")
            http_code=$(echo "$response" | tail -n1)
            
            echo "Attempt $attempt/$max_attempts: HTTP $http_code (waiting ${wait_time}s)"
            
            if [ "$http_code" = "200" ]; then
              echo "✅ Server is ready!"
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "❌ Server failed to start within 120 seconds"
              echo "Server logs (last 50 lines):"
              tail -50 server.log || echo "No server logs available"
              echo ""
              echo "Process info:"
              ps aux | grep -E "node|npm|next" || echo "No processes found"
              exit 1
            fi
            
            # Exponential backoff: 1s, 2s, 3s, max 5s
            if [ $wait_time -lt 5 ]; then
              wait_time=$((wait_time + 1))
            fi
            sleep $wait_time
          done
      
      - name: Run integration tests
        run: npx vitest run --config vitest.integration.config.ts --reporter=verbose
        env:
          BASE_URL: http://localhost:3000
          MONGODB_URI: mongodb://localhost:27017/test_db
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_LOCATION_ID: ${{ secrets.SQUARE_LOCATION_ID }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Capture server logs for debugging
        if: always()
        run: |
          echo "=== Server Output ===" >> integration-test-debug.log
          cat server.log >> integration-test-debug.log 2>/dev/null || echo "No server logs" >> integration-test-debug.log
          echo "=== Process Info ===" >> integration-test-debug.log
          ps aux | grep -E "node|npm|next" >> integration-test-debug.log 2>/dev/null || true
      
      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
            sleep 1
          fi
          # Kill any remaining node processes
          pkill -f "node.*next" || true
      
      - name: Upload test results and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            *.log
            server.log

  database-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
       - uses: actions/checkout@v4
       
       - name: Setup Node.js
         uses: actions/setup-node@v4
         with:
           node-version: '20'
           cache: 'npm'
       
       - name: Install dependencies
         run: npm ci
       
       - name: Wait for MongoDB
         run: |
           echo "Waiting for MongoDB to be ready..."
           for i in {1..30}; do
             if mongosh --eval "db.adminCommand({ping: 1})" --quiet mongodb://localhost:27017 2>/dev/null; then
               echo "✅ MongoDB is ready!"
               break
             fi
             echo "Attempt $i: MongoDB not ready yet..."
             sleep 2
           done
       
       - name: Run database integration tests
         run: npx vitest run --config vitest.db.config.ts --reporter=verbose 2>&1 | tee db-test.log
         env:
           MONGODB_URI: mongodb://localhost:27017/test_db
           MONGO_URL: mongodb://localhost:27017/test_db
       
       - name: Upload database test logs
         if: always()
         uses: actions/upload-artifact@v4
         with:
           name: database-test-logs
           path: db-test.log
       
       - name: Generate test summary
         if: always()
         run: |
           echo "## Database Integration Tests" >> $GITHUB_STEP_SUMMARY
           if [ -f db-test.log ] && grep -q "passed" db-test.log; then
             echo "✅ Database tests completed successfully" >> $GITHUB_STEP_SUMMARY
           else
             echo "❌ Database tests encountered issues - see logs" >> $GITHUB_STEP_SUMMARY
           fi
  
  test-summary:
    name: Integration Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [integration-tests, database-tests]
    
    steps:
      - name: Check test results
        run: |
          echo "## 🧪 Integration Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.integration-tests.result }}" = "success" ]; then
            echo "✅ API Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ API Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.database-tests.result }}" = "success" ]; then
            echo "✅ Database Integration Tests: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Database Integration Tests: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:** Review artifact logs or run \`npm run diagnose\` locally." >> $GITHUB_STEP_SUMMARY
