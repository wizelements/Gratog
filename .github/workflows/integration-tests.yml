name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Wait for MongoDB
        run: |
          echo "Waiting for MongoDB to be ready..."
          for i in {1..30}; do
            if mongosh --eval "db.adminCommand({ping: 1})" --quiet mongodb://localhost:27017 2>/dev/null; then
              echo "MongoDB is ready!"
              break
            fi
            echo "Attempt $i: MongoDB not ready yet..."
            sleep 2
          done
      
      - name: Build application
        run: yarn build
        env:
          MONGODB_URI: mongodb://localhost:27017/test_db
          MONGO_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-for-ci
          ADMIN_JWT_SECRET: test-admin-jwt-secret-for-ci
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Start server in background
        run: |
          yarn start &
          echo $! > server.pid
          echo "Server PID: $(cat server.pid)"
        env:
          PORT: 3000
          MONGODB_URI: mongodb://localhost:27017/test_db
          MONGO_URL: mongodb://localhost:27017/test_db
          JWT_SECRET: test-jwt-secret-for-ci
          ADMIN_JWT_SECRET: test-admin-jwt-secret-for-ci
          ADMIN_API_KEY: test-admin-api-key
          MASTER_API_KEY: test-master-api-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Wait for server to be ready
        run: |
          echo "Waiting for server to be ready..."
          for i in {1..60}; do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Server failed to start within 120 seconds"
              exit 1
            fi
            echo "Attempt $i: Server not ready yet..."
            sleep 2
          done
      
      - name: Run integration tests
        run: yarn vitest run --config vitest.integration.config.ts --reporter=verbose
        env:
          BASE_URL: http://localhost:3000
          MONGODB_URI: mongodb://localhost:27017/test_db
          SQUARE_ACCESS_TOKEN: ${{ secrets.SQUARE_ACCESS_TOKEN }}
          SQUARE_ENVIRONMENT: sandbox
      
      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
          fi
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: |
            test-results/
            *.log

  database-tests:
    name: Database Integration Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      
      - name: Run database integration tests
        run: yarn vitest run --config vitest.db.config.ts --reporter=verbose
        env:
          MONGODB_URI: mongodb://localhost:27017/test_db
          MONGO_URL: mongodb://localhost:27017/test_db
      
      - name: Generate test summary
        if: always()
        run: |
          echo "## Database Integration Tests" >> $GITHUB_STEP_SUMMARY
          echo "✅ Database tests completed" >> $GITHUB_STEP_SUMMARY
